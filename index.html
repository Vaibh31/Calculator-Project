<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", sans-serif; min-height: 100vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: #1E293B; transition: background-color 0.5s ease;
    }
    h1 { color: white; font-size: 2rem; margin-bottom: 10px;
         text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
    #color-code {
      font-family: "Consolas", monospace; font-size: 3.5rem;
      font-weight: 800; color: white; margin: 20px 0;
      text-shadow: 0 2px 15px rgba(0,0,0,0.4);
      cursor: pointer;  /* Indicates it's clickable */
    }
    #color-code:hover::after { content: " 📋"; font-size: 1.5rem; }
    .buttons { display: flex; gap: 12px; }
    button {
      padding: 14px 32px; font-size: 1.1rem; font-weight: 600;
      border: none; border-radius: 12px; cursor: pointer;
      transition: transform 0.15s;
    }
    button:active { transform: scale(0.95); }
    #random-btn { background: white; color: #1E293B; }
    #copy-btn   { background: rgba(255,255,255,0.2); color: white; }
    #toast {
      position: fixed; bottom: 30px; background: #16A34A; color: white;
      padding: 12px 24px; border-radius: 8px; font-weight: 600;
      opacity: 0; transition: opacity 0.3s;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>Random Color Generator</h1>
  <div id="color-code">#1E293B</div>
  <div class="buttons">
    <button id="random-btn">Generate Color</button>
    <button id="copy-btn">Copy Code</button>
  </div>
  <div id="toast">Copied to clipboard!</div>
  <script src="script.js"></script>
</body>
</html>
